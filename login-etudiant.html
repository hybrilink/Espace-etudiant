<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Connexion Étudiant - Faculté Agronomique</title>
    <meta name="theme-color" content="#003366">
    <meta name="description" content="Connexion à l'espace étudiant avec notifications en temps réel">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="icon" type="image/png" href="icon-96x96.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FAC Agro">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary-blue: #003366; --dark-blue: #002244; --accent-yellow: #ffb347; }
        
        body {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            position: relative;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px 35px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
            animation: fadeInUp 0.6s ease-out;
            position: relative;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-yellow), var(--primary-blue));
            border-radius: 30px 30px 0 0;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 25px -5px rgba(0,51,102,0.4);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        .logo-icon i { font-size: 45px; color: var(--accent-yellow); }
        .logo h2 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 5px; }
        .logo p { font-size: 14px; color: #666; }
        
        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group-custom i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-blue);
            font-size: 18px;
            z-index: 1;
        }
        .input-group-custom input {
            width: 100%;
            padding: 14px 15px 14px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        .input-group-custom input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,51,102,0.1);
        }
        .input-group-custom input.error {
            border-color: #dc3545;
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,51,102,0.5);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .btn-login .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .switch-action {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .switch-action a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .switch-action a:hover { color: var(--accent-yellow); }
        
        .alert-custom {
            background: #f8d7da;
            color: #721c24;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        .alert-success-custom {
            background: #d4edda;
            color: #155724;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .info-banner {
            background: #e8f4fd;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-blue);
            font-size: 13px;
        }
        
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 280px;
            max-width: 350px;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast { animation: slideInRight 0.3s ease-out; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .install-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 16px 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            border-radius: 20px 20px 0 0;
        }
        .install-banner.show { transform: translateY(0); }
        .install-banner-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .install-banner-text { flex: 1; }
        .install-banner-text strong { font-size: 15px; color: #003366; }
        .install-banner-text p { font-size: 12px; color: #666; margin: 0; }
        .btn-install {
            background: #003366;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-close-banner {
            background: none;
            border: none;
            color: #999;
            font-size: 20px;
            cursor: pointer;
        }
        
        .captcha-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .captcha-container.show { display: flex; }
        .captcha-code {
            background: var(--primary-blue);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 3px;
        }
        .captcha-input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; }
        .captcha-refresh { background: none; border: none; cursor: pointer; color: var(--primary-blue); }
        
        .footer-info {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            z-index: 1;
        }
        
        .offline-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: var(--accent-yellow);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: none;
            z-index: 100;
        }
        .offline-badge.show { display: flex; align-items: center; gap: 5px; }
        
        @media (max-width: 480px) {
            .login-card { padding: 30px 25px; }
            .toast-notification { right: 10px; left: 10px; min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="offline-badge" id="offlineBadge">
        <i class="bi bi-wifi-off"></i> Hors ligne
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="bi bi-mortarboard-fill"></i>
                </div>
                <h2>Faculté Agronomique</h2>
                <p>Espace Étudiant - UNILU</p>
            </div>
            
            <div id="alertMessage" class="alert-custom"></div>
            
            <!-- Formulaire de connexion -->
            <div id="loginForm">
                <div class="input-group-custom">
                    <i class="bi bi-person-badge"></i>
                    <input type="text" id="matricule" placeholder="Matricule" autocomplete="off">
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" placeholder="Mot de passe">
                </div>
                
                <div class="captcha-container" id="captchaContainer">
                    <span class="captcha-code" id="captchaCode">ABCD</span>
                    <input type="text" id="captchaInput" class="captcha-input" placeholder="Code" maxlength="4">
                    <button type="button" class="captcha-refresh" id="refreshCaptcha">
                        <i class="bi bi-arrow-repeat"></i>
                    </button>
                </div>
                
                <button class="btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Se connecter
                </button>
                <div class="switch-action">
                    <a id="showActivationLink">Activer mon compte / Créer mot de passe</a>
                </div>
            </div>
            
            <!-- Formulaire d'activation -->
            <div id="activationForm" style="display: none;">
                <div class="info-banner">
                    <i class="bi bi-info-circle-fill"></i> Activez votre compte en créant votre mot de passe.
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-person-badge"></i>
                    <input type="text" id="activationMatricule" placeholder="Matricule">
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="newPassword" placeholder="Nouveau mot de passe (min. 4)">
                </div>
                <div class="input-group-custom">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirmer">
                </div>
                <button class="btn-login" id="activationBtn">
                    <i class="bi bi-check-circle"></i> Activer mon compte
                </button>
                <div class="switch-action">
                    <a id="showLoginLink">← Retour à la connexion</a>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toastContainer" class="toast-notification"></div>
    <div class="footer-info">HYBRILINK-TECH | Notifications en temps réel</div>
    
    <div class="install-banner" id="installBanner">
        <div class="install-banner-content">
            <div class="install-banner-text">
                <strong><i class="bi bi-download"></i> Installer l'application</strong>
                <p>Ajoutez FAC Agro à votre écran d'accueil</p>
            </div>
            <button class="btn-install" id="installBtn">Installer</button>
            <button class="btn-close-banner" id="closeInstallBanner">&times;</button>
        </div>
    </div>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBb82N2-5ns7qKjQBAj5UvDW87s2PZ27F0",
            authDomain: "fsa-unilu.firebaseapp.com",
            projectId: "fsa-unilu",
            storageBucket: "fsa-unilu.firebasestorage.app",
            messagingSenderId: "36551990738",
            appId: "1:36551990738:web:e91fdcb53f8aab5d1b7c0b"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const messaging = firebase.messaging();
        
        // ==================== VARIABLES ====================
        let deferredPrompt = null;
        let loginAttempts = 0;
        let currentCaptcha = '';
        
        // ==================== FONCTIONS ====================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const colors = {
                success: { bg: '#28a745', icon: 'check-circle-fill' },
                warning: { bg: '#ffc107', icon: 'exclamation-triangle-fill', textColor: '#333' },
                danger: { bg: '#dc3545', icon: 'x-circle-fill' },
                info: { bg: '#17a2b8', icon: 'info-circle-fill' }
            };
            const config = colors[type] || colors.success;
            const textColor = config.textColor || 'white';
            const toastHtml = `<div class="toast" style="background: ${config.bg}; color: ${textColor};"><div class="toast-body"><i class="bi bi-${config.icon} me-2"></i>${message}</div></div>`;
            container.insertAdjacentHTML('afterbegin', toastHtml);
            setTimeout(() => { if (container.firstElementChild) container.firstElementChild.remove(); }, 4000);
        }
        
        function showAlert(message, isError = true) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = isError ? 'alert-custom' : 'alert-custom alert-success-custom';
            alertDiv.style.display = 'block';
            setTimeout(() => { alertDiv.style.display = 'none'; }, 5000);
        }
        
        function genererCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let captcha = '';
            for (let i = 0; i < 4; i++) captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            currentCaptcha = captcha;
            document.getElementById('captchaCode').textContent = captcha;
        }
        
        function verifierCaptcha() {
            const input = document.getElementById('captchaInput');
            if (!input) return true;
            return input.value.toUpperCase() === currentCaptcha;
        }
        
        // ==================== NOTIFICATIONS FCM (CRUCIAL) ====================
        async function setupFCMNotifications(userId, userNom) {
            if (!('Notification' in window)) {
                console.log('❌ Notifications non supportées');
                return null;
            }
            
            try {
                // Demander permission
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    console.log('❌ Permission refusée');
                    return null;
                }
                
                // Obtenir le token FCM
                const token = await messaging.getToken({
                    vapidKey: 'BF5HAVpFcXeBzVgHROjPYpjIShMXlJaVqNkFqYmwQzQxA9TMJPJgMCpJqUqFhGnOZQpKkVXQJpGYKhJaVqNkFqY'
                });
                
                console.log('✅ Token FCM obtenu:', token);
                
                // Sauvegarder le token dans Firestore (collection fcmTokens)
                await db.collection('fcmTokens').doc(userId).set({
                    token: token,
                    userId: userId,
                    userNom: userNom,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    userAgent: navigator.userAgent,
                    platform: navigator.platform
                }, { merge: true });
                
                console.log('✅ Token FCM sauvegardé dans Firestore');
                
                // Notification test
                setTimeout(() => {
                    new Notification('✅ Notifications activées', {
                        body: 'Vous recevrez les alertes en temps réel même en arrière-plan.',
                        icon: '/icon-192x192.png',
                        badge: '/icon-96x96.png',
                        vibrate: [200, 100, 200]
                    });
                }, 1500);
                
                return token;
                
            } catch (error) {
                console.error('❌ Erreur FCM:', error);
                return null;
            }
        }
        
        // Écouter les messages FCM quand l'application est ouverte
        function setupFCMForegroundListener() {
            messaging.onMessage((payload) => {
                console.log('📨 Message FCM reçu (app ouverte):', payload);
                
                // Afficher un toast
                showToast(payload.notification?.body || 'Nouvelle information', 'info');
                
                // Jouer un son
                try {
                    const audio = new Audio();
                    audio.src = 'data:audio/wav;base64,U3RlYWx0aCBzb3VuZA==';
                    audio.volume = 0.5;
                    audio.play().catch(() => {});
                } catch(e) {}
            });
        }
        
        // ==================== SERVICE WORKERS ====================
        async function registerServiceWorkers() {
            if (!('serviceWorker' in navigator)) return;
            
            try {
                const swRegistration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
                console.log('✅ SW principal enregistré');
                
                const fcmRegistration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                console.log('✅ SW FCM enregistré pour notifications arrière-plan');
                
                return swRegistration;
            } catch(error) {
                console.error('❌ Erreur SW:', error);
            }
        }
        
        // ==================== PWA INSTALLATION ====================
        function setupPWAInstall() {
            const banner = document.getElementById('installBanner');
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            const isInstalled = localStorage.getItem('pwa-installed');
            
            if (!isStandalone && !isInstalled && banner) {
                setTimeout(() => banner.classList.add('show'), 3000);
            }
            
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (!isStandalone && !isInstalled && banner) banner.classList.add('show');
            });
            
            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                localStorage.setItem('pwa-installed', 'true');
                if (banner) banner.classList.remove('show');
                showToast('✅ Application installée avec succès', 'success');
            });
            
            document.getElementById('installBtn')?.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') localStorage.setItem('pwa-installed', 'true');
                    deferredPrompt = null;
                    if (banner) banner.classList.remove('show');
                } else {
                    showToast('Utilisez le menu du navigateur pour installer', 'info');
                }
            });
            
            document.getElementById('closeInstallBanner')?.addEventListener('click', () => {
                if (banner) banner.classList.remove('show');
            });
        }
        
        // ==================== VÉRIFICATION CONNEXION ====================
        function checkOnlineStatus() {
            const offlineBadge = document.getElementById('offlineBadge');
            function updateStatus() {
                if (!navigator.onLine) {
                    offlineBadge.classList.add('show');
                    showToast('Mode hors ligne - Vérifiez votre connexion', 'warning');
                } else {
                    offlineBadge.classList.remove('show');
                }
            }
            window.addEventListener('online', updateStatus);
            window.addEventListener('offline', updateStatus);
            updateStatus();
        }
        
        // ==================== ACTIVATION COMPTE ====================
        document.getElementById('activationBtn').onclick = async () => {
            const matricule = document.getElementById('activationMatricule').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!matricule) { showAlert('Matricule requis', true); return; }
            if (!newPassword || newPassword.length < 4) { showAlert('Mot de passe (min. 4 caractères)', true); return; }
            if (newPassword !== confirmPassword) { showAlert('Mots de passe différents', true); return; }
            
            const btn = document.getElementById('activationBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Activation...';
            
            try {
                const studentQuery = await db.collection('etudiants').where('matricule', '==', matricule).get();
                if (studentQuery.empty) throw new Error('Matricule non trouvé');
                
                const studentDoc = studentQuery.docs[0];
                const studentData = studentDoc.data();
                if (studentData.motDePasse && studentData.compteActive) throw new Error('Compte déjà activé');
                
                await db.collection('etudiants').doc(studentDoc.id).update({
                    motDePasse: newPassword,
                    compteActive: true,
                    dateActivation: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                showAlert('✅ Compte activé ! Connectez-vous', false);
                document.getElementById('activationForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
                
            } catch (error) { showAlert(error.message, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-circle"></i> Activer mon compte';
            }
        };
        
        // ==================== CONNEXION ====================
        document.getElementById('loginBtn').onclick = async () => {
            const matricule = document.getElementById('matricule').value.trim();
            const password = document.getElementById('password').value;
            
            if (!matricule || !password) { showAlert('Matricule et mot de passe requis', true); return; }
            
            // CAPTCHA après 3 tentatives
            if (loginAttempts >= 3) {
                const captchaContainer = document.getElementById('captchaContainer');
                if (!captchaContainer.classList.contains('show')) {
                    captchaContainer.classList.add('show');
                    genererCaptcha();
                    showAlert('Code de sécurité requis', 'warning');
                    return;
                }
                if (!verifierCaptcha()) {
                    showAlert('Code incorrect', true);
                    genererCaptcha();
                    document.getElementById('captchaInput').value = '';
                    return;
                }
            }
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Connexion...';
            
            try {
                const studentQuery = await db.collection('etudiants').where('matricule', '==', matricule).get();
                if (studentQuery.empty) throw new Error('Matricule incorrect');
                
                const studentDoc = studentQuery.docs[0];
                const studentData = studentDoc.data();
                
                if (!studentData.compteActive || !studentData.motDePasse) throw new Error('Compte non activé');
                if (studentData.motDePasse !== password) throw new Error('Mot de passe incorrect');
                
                // Créer session
                const sessionData = {
                    id: studentDoc.id,
                    matricule: studentData.matricule,
                    nom: studentData.nom,
                    promotion: studentData.promotion,
                    email: studentData.email || '',
                    loginTime: Date.now(),
                    expires: Date.now() + (24 * 60 * 60 * 1000)
                };
                localStorage.setItem('session_etudiant', JSON.stringify(sessionData));
                
                // 🔔 OBTENIR ET SAUVEGARDER LE TOKEN FCM (CRUCIAL pour notifications)
                await setupFCMNotifications(studentDoc.id, studentData.nom);
                
                // Configurer l'écouteur FCM pour messages en foreground
                setupFCMForegroundListener();
                
                // Informer le Service Worker
                const registration = await navigator.serviceWorker.ready;
                if (registration.active) {
                    registration.active.postMessage({
                        type: 'SAVE_STUDENT_SESSION',
                        studentId: studentDoc.id
                    });
                }
                
                showToast('✅ Connexion réussie ! Redirection...', 'success');
                
                setTimeout(() => { window.location.href = 'etudiant.html'; }, 1000);
                
            } catch (error) {
                loginAttempts++;
                showAlert(error.message, true);
                if (loginAttempts >= 3) {
                    document.getElementById('captchaContainer').classList.add('show');
                    genererCaptcha();
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Se connecter';
            }
        };
        
        // ==================== NAVIGATION ====================
        document.getElementById('showActivationLink').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('activationForm').style.display = 'block';
            document.getElementById('alertMessage').style.display = 'none';
        };
        
        document.getElementById('showLoginLink').onclick = () => {
            document.getElementById('activationForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('alertMessage').style.display = 'none';
            document.getElementById('activationMatricule').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        };
        
        document.getElementById('refreshCaptcha').onclick = () => {
            genererCaptcha();
            document.getElementById('captchaInput').value = '';
        };
        
        // ==================== RACCOURCIS ====================
        ['matricule', 'password'].forEach(id => {
            document.getElementById(id)?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('loginBtn').click();
            });
        });
        
        // ==================== INITIALISATION ====================
        async function init() {
            console.log('🚀 Login - Démarrage');
            console.log('🔔 Activation des notifications en arrière-plan...');
            
            await registerServiceWorkers();
            setupPWAInstall();
            checkOnlineStatus();
            
            // Vérifier session existante
            const session = localStorage.getItem('session_etudiant');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    if (Date.now() < data.expires) {
                        console.log('✅ Session valide, redirection');
                        window.location.href = 'etudiant.html';
                        return;
                    }
                } catch(e) {}
            }
            
            console.log('✅ Login prêt - Notifications FCM activées');
        }
        
        init();
        
        // Console branding
        console.log('%c🔔 NOTIFICATIONS EN ARRIÈRE-PLAN ACTIVÉES', 'color: #ffb347; font-size: 12px; font-weight: bold;');
        console.log('%cVous recevrez les alertes même application fermée', 'color: #28a745; font-size: 11px;');
    </script>
</body>
</html>
