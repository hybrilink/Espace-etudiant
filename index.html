<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Espace Étudiant - Faculté Agronomique</title>
    <meta name="theme-color" content="#003366">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="icon" type="image/png" href="icon-96x96.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary-blue: #003366; --dark-blue: #002244; --accent-yellow: #ffb347; }
        
        body {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .splash-container {
            text-align: center;
            padding: 30px 20px;
            animation: fadeInUp 0.8s ease-out;
            max-width: 400px;
            width: 100%;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo-icon {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3);
        }
        
        .logo-icon i { font-size: 60px; color: var(--primary-blue); }
        
        .logo h1 {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .logo p {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid var(--accent-yellow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 15px;
        }
        
        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo">
            <div class="logo-icon">
                <i class="bi bi-tree-fill"></i>
            </div>
            <h1>Faculté Agronomique</h1>
            <p>Espace Étudiant - UNILU</p>
        </div>
        
        <div class="loader"></div>
        <div class="loading-text">
            <i class="bi bi-arrow-repeat"></i> Chargement...
        </div>
        
        <div class="footer">
            <i class="bi bi-shield-check"></i> HYBRILINK-TECH
        </div>
    </div>

    <script>
        (function() {
            console.log('🚀 INDEX - Démarrage');
            
            // Vérifier la session
            let sessionValide = false;
            try {
                const session = localStorage.getItem('session_etudiant');
                if (session) {
                    const data = JSON.parse(session);
                    if (Date.now() < data.expires) {
                        sessionValide = true;
                        console.log('✅ Session valide');
                    } else {
                        localStorage.removeItem('session_etudiant');
                    }
                }
            } catch(e) {
                console.error('Erreur session:', e);
            }
            
            // Redirection
            setTimeout(() => {
                if (sessionValide) {
                    window.location.href = 'etudiant.html';
                } else {
                    window.location.href = 'login-etudiant.html';
                }
            }, 800);
        })();
    </script>
</body>
</html>
