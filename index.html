<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Espace Étudiant - Faculté Agronomique</title>
    <meta name="theme-color" content="#003366">
    <meta name="description" content="Application étudiante de la Faculté Agronomique - UNILU">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="icon" type="image/png" href="icon-96x96.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FAC Agro">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --primary-blue: #003366; 
            --dark-blue: #002244; 
            --accent-yellow: #ffb347; 
        }
        
        body {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animation de fond */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.03)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            opacity: 0.3;
            pointer-events: none;
        }
        
        .splash-container {
            text-align: center;
            padding: 30px 20px;
            animation: fadeInUp 0.8s ease-out;
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            margin-bottom: 40px;
        }
        
        .logo-icon {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, white, #f8f9fa);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .logo-icon i {
            font-size: 65px;
            color: var(--primary-blue);
        }
        
        .logo h1 {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .logo p {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        .loader-wrapper {
            background: rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 5px;
            margin: 30px auto;
            max-width: 280px;
            backdrop-filter: blur(10px);
        }
        
        .loader {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .loader-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-yellow), #ff9800);
            border-radius: 10px;
            animation: loading 2s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 70%; left: 0; }
            100% { width: 100%; left: 0; }
        }
        
        .loading-text {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .loading-text i {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .steps {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .step {
            text-align: center;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .step.active {
            opacity: 1;
        }
        
        .step-icon {
            width: 35px;
            height: 35px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
        }
        
        .step-icon i {
            color: white;
            font-size: 18px;
        }
        
        .step-text {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
        }
        
        .step.active .step-text {
            color: var(--accent-yellow);
        }
        
        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            z-index: 1;
        }
        
        .footer img {
            width: 25px;
            border-radius: 12px;
            vertical-align: middle;
            margin-left: 5px;
        }
        
        .version-info {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.6;
        }
        
        /* Mode hors ligne */
        .offline-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: var(--accent-yellow);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: none;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        
        .offline-badge.show {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        @media (max-width: 480px) {
            .logo-icon { width: 85px; height: 85px; }
            .logo-icon i { font-size: 50px; }
            .logo h1 { font-size: 22px; }
            .steps { gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="offline-badge" id="offlineBadge">
        <i class="bi bi-wifi-off"></i> Mode hors ligne
    </div>
    
    <div class="splash-container">
        <div class="logo">
            <div class="logo-icon">
                <i class="bi bi-tree-fill"></i>
            </div>
            <h1>Faculté Agronomique</h1>
            <p>Espace Étudiant - UNILU</p>
        </div>
        
        <div class="loader-wrapper">
            <div class="loader">
                <div class="loader-progress"></div>
            </div>
        </div>
        
        <div class="loading-text" id="loadingText">
            <i class="bi bi-arrow-repeat"></i> Initialisation...
        </div>
        
        <div class="steps">
            <div class="step" id="step1">
                <div class="step-icon"><i class="bi bi-check-lg"></i></div>
                <div class="step-text">Connexion</div>
            </div>
            <div class="step" id="step2">
                <div class="step-icon"><i class="bi bi-arrow-repeat"></i></div>
                <div class="step-text">Chargement</div>
            </div>
            <div class="step" id="step3">
                <div class="step-icon"><i class="bi bi-house-door"></i></div>
                <div class="step-text">Dashboard</div>
            </div>
        </div>
        
        <div class="footer">
            <i class="bi bi-shield-check"></i> HYBRILINK-TECH<br>
            <img src="t.png" alt="HYBRILINK" onerror="this.style.display='none'">
            <div class="version-info">Version 2.0 | Notifications en temps réel</div>
        </div>
    </div>

    <script>
        // ==================== VARIABLES ====================
        let redirectTimeout = null;
        let currentStep = 1;
        
        // ==================== FONCTIONS ====================
        function updateStep(step) {
            currentStep = step;
            for (let i = 1; i <= 3; i++) {
                const stepEl = document.getElementById(`step${i}`);
                if (stepEl) {
                    if (i < step) {
                        stepEl.classList.add('active');
                        const icon = stepEl.querySelector('i');
                        if (icon) icon.className = 'bi bi-check-lg';
                    } else if (i === step) {
                        stepEl.classList.add('active');
                        const icon = stepEl.querySelector('i');
                        if (icon) icon.className = 'bi bi-arrow-repeat spin';
                    } else {
                        stepEl.classList.remove('active');
                    }
                }
            }
        }
        
        function updateLoadingText(text) {
            const loadingText = document.getElementById('loadingText');
            if (loadingText) {
                loadingText.innerHTML = `<i class="bi bi-arrow-repeat"></i> ${text}`;
            }
        }
        
        // ==================== VÉRIFICATION SESSION ====================
        function checkSession() {
            try {
                const session = localStorage.getItem('session_etudiant');
                if (session) {
                    const sessionData = JSON.parse(session);
                    if (Date.now() < sessionData.expires) {
                        console.log('✅ Session valide trouvée');
                        return sessionData;
                    } else {
                        console.log('⏰ Session expirée');
                        localStorage.removeItem('session_etudiant');
                    }
                }
            } catch(e) {
                console.error('Erreur session:', e);
                localStorage.removeItem('session_etudiant');
            }
            return null;
        }
        
        // ==================== SERVICE WORKER ====================
        async function registerServiceWorkers() {
            if (!('serviceWorker' in navigator)) {
                console.log('❌ Service Worker non supporté');
                return null;
            }
            
            try {
                updateLoadingText('Enregistrement du Service Worker...');
                updateStep(2);
                
                // Enregistrer le SW principal
                const swRegistration = await navigator.serviceWorker.register('/sw.js', {
                    scope: '/'
                });
                console.log('✅ Service Worker principal enregistré:', swRegistration.scope);
                
                // Enregistrer le SW FCM (CRUCIAL pour notifications arrière-plan)
                const fcmRegistration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                console.log('✅ Service Worker FCM enregistré pour notifications arrière-plan');
                
                return swRegistration;
            } catch (error) {
                console.error('❌ Erreur Service Worker:', error);
                return null;
            }
        }
        
        // ==================== VÉRIFICATION CONNEXION ====================
        function checkOnlineStatus() {
            const offlineBadge = document.getElementById('offlineBadge');
            
            function updateStatus() {
                if (!navigator.onLine) {
                    offlineBadge.classList.add('show');
                    console.log('📡 Mode hors ligne détecté');
                } else {
                    offlineBadge.classList.remove('show');
                }
            }
            
            window.addEventListener('online', updateStatus);
            window.addEventListener('offline', updateStatus);
            updateStatus();
        }
        
        // ==================== PRÉCHARGEMENT ====================
        function preloadResources() {
            const pagesToPreload = ['etudiant.html', 'communiquer.html', 'paiement.html'];
            
            if ('requestIdleCallback' in window) {
                requestIdleCallback(() => {
                    pagesToPreload.forEach(page => {
                        const link = document.createElement('link');
                        link.rel = 'prefetch';
                        link.href = page;
                        document.head.appendChild(link);
                    });
                    console.log('📦 Préchargement des ressources');
                });
            }
        }
        
        // ==================== REDIRECTION ====================
        function redirectToTarget(sessionData) {
            updateLoadingText('Redirection...');
            updateStep(3);
            
            setTimeout(() => {
                if (sessionData) {
                    console.log('🚀 Redirection vers etudiant.html');
                    window.location.href = 'etudiant.html';
                } else {
                    console.log('🚀 Redirection vers login-etudiant.html');
                    window.location.href = 'login-etudiant.html';
                }
            }, 800);
        }
        
        // ==================== ANALYTIQUE ====================
        function logStartup() {
            const now = Date.now();
            localStorage.setItem('app_last_start', now.toString());
            
            let visitCount = parseInt(localStorage.getItem('visit_count') || '0');
            visitCount++;
            localStorage.setItem('visit_count', visitCount);
            console.log(`📊 Visite #${visitCount}`);
        }
        
        // ==================== INITIALISATION ====================
        async function init() {
            console.log('🚀 Démarrage de l\'application...');
            console.log('📱 User Agent:', navigator.userAgent);
            
            logStartup();
            
            // Étape 1: Vérification de la session
            updateLoadingText('Vérification de la session...');
            updateStep(1);
            
            const sessionData = checkSession();
            
            // Vérifier l'état de la connexion
            checkOnlineStatus();
            
            // Précharger les ressources
            preloadResources();
            
            // Étape 2: Enregistrement Service Workers
            updateLoadingText('Activation des notifications...');
            updateStep(2);
            
            await registerServiceWorkers();
            
            // Étape 3: Redirection
            redirectToTarget(sessionData);
        }
        
        // Gestionnaire d'erreur global
        window.addEventListener('error', (event) => {
            console.error('❌ Erreur globale:', event.error);
            if (!redirectTimeout) {
                redirectTimeout = setTimeout(() => {
                    const sessionData = checkSession();
                    window.location.href = sessionData ? 'etudiant.html' : 'login-etudiant.html';
                }, 2000);
            }
        });
        
        // Démarrer l'application
        init().catch(error => {
            console.error('❌ Erreur fatale:', error);
            setTimeout(() => {
                const sessionData = checkSession();
                window.location.href = sessionData ? 'etudiant.html' : 'login-etudiant.html';
            }, 2000);
        });
        
        // Console branding
        console.log('%c🔔 FACULTÉ AGRONOMIQUE - ESPACE ÉTUDIANT', 'color: #ffb347; font-size: 14px; font-weight: bold;');
        console.log('%cVersion 2.0 | Notifications en arrière-plan activées', 'color: #003366; font-size: 12px;');
        console.log('%c© HYBRILINK-TECH', 'color: #666; font-size: 11px;');
    </script>
</body>
</html>
